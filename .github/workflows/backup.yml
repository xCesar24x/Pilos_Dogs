name: Auto-sync Backup

on:
  push:
    branches: [ main, master ]
  schedule:
    # Sincroniza cada 6 horas automáticamente
    - cron: '0 */6 * * *'

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Verify files
      run: |
        echo "✅ Archivos sincronizados:"
        ls -lah
    
    - name: Log successful sync
      run: echo "✅ Backup completado en $(date)" >> sync.log
    
    - name: Commit changes (if any)
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add -A
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-backup: $(date '+%Y-%m-%d %H:%M:%S')" && git push)
      continue-on-error: true
